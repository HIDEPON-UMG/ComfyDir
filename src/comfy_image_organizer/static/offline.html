<!doctype html>
<html lang="ja" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#56C6E3" />
  <meta name="color-scheme" content="dark" />
  <title>ComfyDir — サーバが起動していません</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <style>
    :root {
      --color-bg-base:    #1A1B1F;
      --color-bg-surface: #232428;
      --color-fg-primary: #F4F4F6;
      --color-fg-secondary: #BFC0C5;
      --color-fg-muted:   #888A91;
      --color-border:     #3D3F45;
      --color-accent:     #56C6E3;
      --color-accent-hover: #82D6EC;
      --font-sans: Inter, "Noto Sans JP", system-ui, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--color-bg-base);
      color: var(--color-fg-primary);
      font-family: var(--font-sans);
      font-size: 14px;
      line-height: 1.6;
    }
    .card {
      width: min(560px, 88vw);
      background: var(--color-bg-surface);
      border: 1px solid var(--color-border);
      border-radius: 12px;
      padding: 32px;
      box-shadow: 0 16px 32px rgba(0, 0, 0, 0.45);
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.025em;
      margin: 0 0 8px;
    }
    .lead {
      color: var(--color-fg-secondary);
      margin: 0 0 24px;
    }
    .steps {
      margin: 0 0 24px;
      padding-left: 20px;
      color: var(--color-fg-secondary);
    }
    .steps li { margin: 4px 0; }
    .steps strong { color: var(--color-fg-primary); }
    code {
      font-family: "JetBrains Mono", "SF Mono", monospace;
      font-size: 12px;
      background: #1E1F23;
      border: 1px solid var(--color-border);
      border-radius: 4px;
      padding: 1px 6px;
    }
    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    button {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      border: 0;
      border-radius: 8px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 120ms;
    }
    .btn-primary {
      background: var(--color-accent);
      color: #1A1B1F;
    }
    .btn-primary:hover { background: var(--color-accent-hover); }
    .btn-secondary {
      background: transparent;
      color: var(--color-fg-secondary);
      border: 1px solid var(--color-border);
    }
    .btn-secondary:hover {
      background: #2D2E33;
      color: var(--color-fg-primary);
    }
    .footer {
      margin-top: 24px;
      padding-top: 16px;
      border-top: 1px solid var(--color-border);
      font-size: 12px;
      color: var(--color-fg-muted);
    }
    .dot {
      width: 8px; height: 8px;
      background: #E36C4F;
      border-radius: 50%;
      display: inline-block;
      vertical-align: middle;
      margin-right: 6px;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1><span class="dot" aria-hidden="true"></span>ComfyDir サーバに接続できません</h1>
    <p class="lead">バックエンド (uvicorn) が起動していないか、ネットワークの一時的な問題で <code>127.0.0.1:8765</code> に到達できませんでした。</p>

    <ol class="steps">
      <li>タスクトレイの ComfyDir アイコンが残っているか確認 (<strong>右クリック → 終了 してから再起動</strong>)</li>
      <li>無ければ <code>start.vbs</code> をダブルクリックで起動</li>
      <li>起動後にこのページの <strong>再試行</strong> ボタンを押す</li>
    </ol>

    <div class="actions">
      <button class="btn-primary" onclick="location.reload()">再試行</button>
      <button class="btn-secondary" onclick="location.href='/'">トップへ</button>
    </div>

    <div class="footer">
      この画面は Service Worker のキャッシュから配信されています。サーバが起動するとオンラインに戻ります。
    </div>
  </main>
</body>
</html>
